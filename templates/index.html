<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Ball Sort Puzzle</title>
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'none';">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green-primary: #00ff41;
            --green-dark: #003b00;
            --green-mid: #00a82d;
            --green-glow: rgba(0, 255, 65, 0.3);
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --bg-input: #1a1a1a;
            --border-color: #1f3d1f;
            --text-dim: #4a7a4a;
            --red: #ff4444;
            --yellow: #ffaa00;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-dark);
            color: var(--green-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        input, textarea {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        /* Matrix rain background */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 65, 0.03) 2px,
                rgba(0, 255, 65, 0.03) 4px
            );
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid var(--green-primary);
            box-shadow: 0 0 30px var(--green-glow), inset 0 0 20px rgba(0, 255, 65, 0.1);
            margin-bottom: 15px;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px var(--green-glow); }
            50% { box-shadow: 0 0 50px var(--green-glow), 0 0 80px rgba(0, 255, 65, 0.1); }
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px var(--green-glow);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 2px;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--green-primary), transparent);
            opacity: 0.5;
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--green-mid);
        }

        /* Form elements */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--green-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--green-primary);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        .form-input::placeholder {
            color: var(--text-dim);
        }

        /* Range inputs */
        .range-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .range-value {
            text-align: center;
            font-size: 0.75rem;
            color: var(--green-primary);
            margin-top: 4px;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: 1px solid var(--green-primary);
            background: transparent;
            color: var(--green-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: rgba(0, 255, 65, 0.15);
        }

        .btn-danger {
            border-color: var(--red);
            color: var(--red);
        }

        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.1);
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-full {
            width: 100%;
        }

        /* Session selector */
        .session-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .session-btn {
            flex: 1;
            padding: 14px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .session-btn.active {
            border-color: var(--green-primary);
            color: var(--green-primary);
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        .session-btn:hover {
            border-color: var(--green-mid);
            color: var(--green-mid);
        }

        /* Console/Log */
        .console {
            background: #050505;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.75rem;
            line-height: 1.8;
        }

        .console::-webkit-scrollbar {
            width: 6px;
        }

        .console::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .console::-webkit-scrollbar-thumb {
            background: var(--green-dark);
            border-radius: 3px;
        }

        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid rgba(0, 255, 65, 0.05);
        }

        .log-success {
            color: var(--green-primary);
        }

        .log-error {
            color: var(--red);
        }

        .log-warning {
            color: var(--yellow);
        }

        .log-info {
            color: var(--text-dim);
        }

        .log-time {
            color: #333;
            margin-right: 8px;
        }

        /* Status indicator */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-input);
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 0.75rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .status-dot.active {
            background: var(--green-primary);
            box-shadow: 0 0 10px var(--green-glow);
            animation: blink 1s ease-in-out infinite;
        }

        .status-dot.error {
            background: var(--red);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-item {
            text-align: center;
            padding: 12px;
            background: var(--bg-input);
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--green-primary);
            text-shadow: 0 0 10px var(--green-glow);
        }

        .stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 12px;
            }
            .title {
                font-size: 1.3rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .range-group {
                grid-template-columns: 1fr;
            }
            .btn-group {
                flex-direction: column;
            }
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px 0;
            font-size: 0.65rem;
            color: var(--text-dim);
            border-top: 1px solid var(--border-color);
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <!-- Anti-scraper shield: content hidden until JS runs -->
    <div id="app-shield" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:99999;"></div>
    <noscript>
        <div style="color:red;text-align:center;padding:50px;font-size:1.5rem;">
            Este site requer JavaScript habilitado para funcionar.
        </div>
    </noscript>
    <div class="matrix-bg"></div>
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            <img src="/static/logo.png" alt="Logo" class="logo">
            <h1 class="title">Classic Ball Sort Puzzle</h1>
            <p class="subtitle">Dev. MadagascarMods</p>
        </div>

        <!-- Configuration Card -->
        <div class="card fade-in">
            <h2 class="card-title">&#9881; Configuração</h2>
            
            <div class="form-group">
                <label class="form-label">GAID (Google Advertising ID)</label>
                <input type="text" id="gaid" class="form-input" 
                       placeholder="f7ce5a62-d537-4f8d-8e26-167df8126172"
                       value="f7ce5a62-d537-4f8d-8e26-167df8126172">
            </div>

            <div class="form-group">
                <label class="form-label">LTV Range (Ajuste Manual)</label>
                <div class="range-group">
                    <div>
                        <input type="number" id="ltv_min" class="form-input" 
                               value="0.00120" step="0.00001" min="0.00001" max="1.0"
                               placeholder="Min LTV">
                        <div class="range-value">MIN</div>
                    </div>
                    <div>
                        <input type="number" id="ltv_max" class="form-input" 
                               value="0.00230" step="0.00001" min="0.00001" max="1.0"
                               placeholder="Max LTV">
                        <div class="range-value">MAX</div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Quantidade de Rewards por Sessão</label>
                <input type="number" id="count" class="form-input" 
                       value="50" min="1" max="500" placeholder="50">
            </div>

            <div class="form-group">
                <label class="form-label">Delay entre Requests (segundos)</label>
                <input type="number" id="delay" class="form-input" 
                       value="10" min="1" max="120" step="1" placeholder="10">
            </div>
        </div>

        <!-- Session Selector -->
        <div class="card fade-in">
            <h2 class="card-title">&#9654; Sessões</h2>
            
            <div class="form-group">
                <label class="form-label">Quantas sessões deseja executar?</label>
                <div class="session-selector">
                    <button class="session-btn active" data-sessions="1" onclick="selectSessions(1)">
                        1 Sessão
                    </button>
                    <button class="session-btn" data-sessions="2" onclick="selectSessions(2)">
                        2 Sessões
                    </button>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary btn-full" onclick="startReward()">
                    &#9654; Iniciar
                </button>
                <button class="btn btn-danger btn-full" onclick="stopAll()">
                    &#9632; Parar Tudo
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="card fade-in">
            <h2 class="card-title">&#9776; Estatísticas</h2>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="stat-coins">0</div>
                    <div class="stat-label">Moedas Ganhas</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-success">0</div>
                    <div class="stat-label">Sucesso</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-balance">--</div>
                    <div class="stat-label">Saldo Total</div>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Aguardando...</span>
            </div>
        </div>

        <!-- Console -->
        <div class="card fade-in">
            <h2 class="card-title">&#9000; Console</h2>
            <div class="console" id="console">
                <div class="log-entry log-info">
                    <span class="log-time">[--:--:--]</span>
                    Sistema pronto. Configure e inicie a sessão.
                </div>
            </div>
        </div>

        <!-- Login/Balance -->
        <div class="card fade-in">
            <h2 class="card-title">&#128274; Ações Rápidas</h2>
            <div class="btn-group">
                <button class="btn btn-full" onclick="checkLogin()">
                    &#128100; Login / Check
                </button>
                <button class="btn btn-full" onclick="checkBalance()">
                    &#128176; Ver Saldo
                </button>
            </div>
        </div>

        <div class="footer">
            Classic Ball Sort Puzzle &mdash; Dev. MadagascarMods
        </div>
    </div>

    <script>
        // === ANTI-SCRAPING / ANTI-DOWNLOAD PROTECTION ===
        (function() {
            // Block right-click
            document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
            
            // Block keyboard shortcuts (Ctrl+S, Ctrl+U, Ctrl+Shift+I, F12)
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey && (e.key === 's' || e.key === 'S' || e.key === 'u' || e.key === 'U')) {
                    e.preventDefault();
                    return false;
                }
                if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
                    e.preventDefault();
                    return false;
                }
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
            });
            
            // Block drag
            document.addEventListener('dragstart', function(e) { e.preventDefault(); });
            
            // Block text selection
            document.addEventListener('selectstart', function(e) {
                if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                }
            });
            
            // Detect iframe embedding (anti-saveweb2zip)
            if (window.top !== window.self) {
                document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:200px;">Acesso n\u00e3o autorizado</h1>';
            }
            
            // Detect automated tools via timing
            var startTime = Date.now();
            window.addEventListener('load', function() {
                var loadTime = Date.now() - startTime;
                if (loadTime < 100) {
                    // Suspiciously fast load - likely a bot/scraper
                    document.body.innerHTML = '';
                }
            });
            
            // Anti-bot: require JS execution for content
            document.getElementById('app-shield') && document.getElementById('app-shield').remove();
        })();
        
        // Socket.IO connection
        const socket = io();
        
        let selectedSessions = 1;
        let totalCoins = 0;
        let totalSuccess = 0;
        let sessionIds = [];

        function selectSessions(num) {
            selectedSessions = num;
            document.querySelectorAll('.session-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-sessions="${num}"]`).classList.add('active');
            addLog('info', `Selecionado: ${num} sessão(ões)`);
        }

        function getTimestamp() {
            const now = new Date();
            return `[${now.toLocaleTimeString('pt-BR')}]`;
        }

        function addLog(type, message) {
            const console_el = document.getElementById('console');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `<span class="log-time">${getTimestamp()}</span>${message}`;
            console_el.appendChild(entry);
            console_el.scrollTop = console_el.scrollHeight;
        }

        function setStatus(active, text, isError = false) {
            const dot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            dot.className = 'status-dot' + (active ? ' active' : '') + (isError ? ' error' : '');
            statusText.textContent = text;
        }

        async function startReward() {
            const gaid = document.getElementById('gaid').value.trim();
            const ltv_min = parseFloat(document.getElementById('ltv_min').value);
            const ltv_max = parseFloat(document.getElementById('ltv_max').value);
            const count = parseInt(document.getElementById('count').value);
            const delay = parseFloat(document.getElementById('delay').value);

            if (!gaid) {
                addLog('error', 'GAID é obrigatório!');
                return;
            }

            if (ltv_min >= ltv_max) {
                addLog('error', 'LTV Min deve ser menor que LTV Max!');
                return;
            }

            totalCoins = 0;
            totalSuccess = 0;
            document.getElementById('stat-coins').textContent = '0';
            document.getElementById('stat-success').textContent = '0';

            setStatus(true, `Executando ${selectedSessions} sessão(ões)...`);
            addLog('info', `Iniciando ${selectedSessions} sessão(ões) com GAID: ${gaid.substring(0, 8)}...`);
            addLog('info', `LTV: ${ltv_min} - ${ltv_max} | Count: ${count} | Delay: ${delay}s`);

            try {
                const resp = await fetch('/api/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        gaid, ltv_min, ltv_max, count, delay,
                        sessions: selectedSessions
                    })
                });
                const data = await resp.json();
                if (data.session_ids) {
                    sessionIds = data.session_ids;
                    addLog('success', data.message);
                } else {
                    addLog('error', data.error || 'Erro desconhecido');
                    setStatus(false, 'Erro', true);
                }
            } catch (e) {
                addLog('error', `Erro de conexão: ${e.message}`);
                setStatus(false, 'Erro de conexão', true);
            }
        }

        async function stopAll() {
            try {
                await fetch('/api/stop_all', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({})
                });
                addLog('warning', 'Solicitação de parada enviada para todas as sessões.');
                setStatus(false, 'Parando...');
            } catch (e) {
                addLog('error', `Erro: ${e.message}`);
            }
        }

        async function checkLogin() {
            const gaid = document.getElementById('gaid').value.trim();
            if (!gaid) {
                addLog('error', 'GAID é obrigatório!');
                return;
            }

            addLog('info', `Fazendo login com GAID: ${gaid.substring(0, 8)}...`);

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ gaid })
                });
                const data = await resp.json();
                if (data.code === 0) {
                    const d = data.data;
                    addLog('success', `Login OK! userId: ${d.userId}`);
                    addLog('success', `Saldo: ${d.toaAmout} moedas | País: ${d.countryCode}`);
                    document.getElementById('stat-balance').textContent = d.toaAmout || '0';
                } else {
                    addLog('error', `Erro: ${data.msg || 'Falha no login'}`);
                }
            } catch (e) {
                addLog('error', `Erro de conexão: ${e.message}`);
            }
        }

        async function checkBalance() {
            const gaid = document.getElementById('gaid').value.trim();
            if (!gaid) {
                addLog('error', 'GAID é obrigatório!');
                return;
            }

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ gaid })
                });
                const data = await resp.json();
                if (data.code === 0) {
                    const d = data.data;
                    const balance = d.toaAmout || 0;
                    document.getElementById('stat-balance').textContent = balance;
                    addLog('success', `Saldo atual: ${balance} moedas`);
                    if (d.exchangeNum > 0) {
                        addLog('info', `Taxa: ${d.exchangeNum} moedas = ${d.currencySY || 'R$'}1`);
                    }
                } else {
                    addLog('error', `Erro: ${data.msg || 'Falha'}`);
                }
            } catch (e) {
                addLog('error', `Erro de conexão: ${e.message}`);
            }
        }

        // Socket.IO events
        socket.on('session_update', function(data) {
            switch(data.type) {
                case 'success':
                    totalCoins += data.per_amount;
                    totalSuccess++;
                    document.getElementById('stat-coins').textContent = totalCoins;
                    document.getElementById('stat-success').textContent = totalSuccess;
                    if (data.toa_amount) {
                        document.getElementById('stat-balance').textContent = data.toa_amount;
                    }
                    addLog('success', `[S${data.session_num}] ${data.message}`);
                    break;
                case 'error':
                    addLog('error', `[S${data.session_num}] ${data.message}`);
                    break;
                case 'limit':
                    addLog('warning', `[S${data.session_num}] ${data.message}`);
                    break;
                case 'finished':
                    addLog('info', `[S${data.session_num}] ${data.message}`);
                    setStatus(false, 'Finalizado');
                    break;
                case 'stopped':
                    addLog('warning', `[S${data.session_num}] ${data.message}`);
                    setStatus(false, 'Parado');
                    break;
            }
        });

        socket.on('connect', function() {
            addLog('info', 'Conectado ao servidor via WebSocket.');
        });

        socket.on('disconnect', function() {
            addLog('warning', 'Desconectado do servidor.');
            setStatus(false, 'Desconectado', true);
        });
    </script>
</body>
</html>
